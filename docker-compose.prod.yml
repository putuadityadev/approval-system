version: '3.8'

services:
  # ── Laravel Application (nginx + php-fpm inside one container) ──────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file: .env
    volumes:
      # Persistent storage for uploaded files
      - app_storage:/var/www/html/storage/app/public
    networks:
      - approval_network
      - dokploy-network
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    # No ports exposed — Dokploy/Traefik routes traffic to internal port 80
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ── MySQL 8 ──────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE:      ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_USER:          ${DB_USERNAME}
      MYSQL_PASSWORD:      ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - approval_network
    # Do NOT expose port 3306 to host in production
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── MinIO Object Storage ──────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_SERVER_URL:    https://storage.seviraku.cloud
    volumes:
      - minio_data:/data
    networks:
      - approval_network
      - dokploy-network
    command: server /data --console-address ":9001"
    ports:
      - "9001:9001"   # MinIO Console (protect with Dokploy basic auth or firewall)
      # Port 9000 (API) exposed to dokploy-network for Traefik routing
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  mysql_data:
    driver: local
  minio_data:
    driver: local
  app_storage:
    driver: local

networks:
  approval_network:
    driver: bridge
  dokploy-network:
    external: true
