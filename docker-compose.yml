version: '3.8'

services:
  # Laravel Application Container
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      # Di WSL2, tidak perlu named volumes karena filesystem sudah native Linux (fast!)
    ports:
      - "8000:8000"
    networks:
      - laravel_network
    depends_on:
      - db
      - redis
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-mall_approval}
      - DB_USERNAME=${DB_USERNAME:-mall_user}
      - DB_PASSWORD=${DB_PASSWORD:-secret123}
    command: sh -c "composer install --no-interaction && php artisan serve --host=0.0.0.0 --port=8000"

  # MySQL Database Container
  db:
    image: mysql:8.0
    container_name: laravel_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-mall_approval}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret123}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret123}
      MYSQL_USER: ${DB_USERNAME:-mall_user}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      - laravel_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Node.js Container untuk Vite
  node:
    image: node:20-alpine
    container_name: laravel_node
    working_dir: /var/www/html
    tty: true
    volumes:
      - ./:/var/www/html
    ports:
      - "5173:5173"
    networks:
      - laravel_network
    command: sh -c "npm install && npm run dev -- --host"

  # Redis - Queue & Cache
  redis:
    image: redis:7-alpine
    container_name: laravel_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - laravel_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Laravel Horizon - Queue Worker
  horizon:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_horizon
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - laravel_network
    depends_on:
      - db
      - redis
      - mailpit
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-mall_approval}
      - DB_USERNAME=${DB_USERNAME:-mall_user}
      - DB_PASSWORD=${DB_PASSWORD:-secret123}
      - REDIS_HOST=redis
    command: sh -c "composer install --no-interaction && php artisan horizon"

  # Mailpit - Local Email Testing (tangkap semua email tanpa kirim ke luar)
  mailpit:
    image: axllent/mailpit:latest
    container_name: laravel_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"      # Web UI (buka http://localhost:8025)
      - "1025:1025"      # SMTP port
    networks:
      - laravel_network

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    ports:
      - "9000:9000"      # API port
      - "9001:9001"      # Console UI port
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    networks:
      - laravel_network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  mysql_data:
    driver: local
  minio_data:
    driver: local
  redis_data:
    driver: local

networks:
  laravel_network:
    driver: bridge
